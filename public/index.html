<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Wrap Studio - AI 礼品包装纸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { font-family: 'Microsoft YaHei', '微软雅黑', 'PingFang SC', sans-serif; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-spin { animation: spin 1s linear infinite; }
        .bg-macaron { background: linear-gradient(135deg, #e0f7fa 0%, #f3e5f5 25%, #fff3e0 50%, #e8f5e9 75%, #e3f2fd 100%); }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 2px solid rgba(255, 255, 255, 0.5); }
        .btn-primary { background: linear-gradient(135deg, #f48fb1 0%, #ce93d8 100%); box-shadow: 0 4px 15px rgba(244, 143, 177, 0.4); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(244, 143, 177, 0.5); }
        .upload-zone { border: 3px dashed #86efac; background: rgba(255, 255, 255, 0.6); transition: all 0.3s ease; }
        .upload-zone:hover, .upload-zone.dragover { border-color: #f48fb1; background: rgba(244, 143, 177, 0.1); transform: scale(1.02); }
        .style-card { transition: all 0.3s ease; border: 3px solid transparent; }
        .style-card:hover { transform: translateY(-4px); }
        .style-card.selected { border-color: #f48fb1; box-shadow: 0 0 0 4px rgba(244, 143, 177, 0.2); }
        .loading-ring { border: 4px solid rgba(244, 143, 177, 0.2); border-top-color: #f48fb1; border-radius: 50%; animation: spin 1s linear infinite; }
    </style>
</head>
<body class="min-h-screen bg-macaron">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useRef } = React;
        
        const STYLES = [
            { id: 'kawaii', name: '🐰 萌萌可爱', desc: '粉嫩圆润，超治愈' },
            { id: 'pastel', name: '🧁 马卡龙', desc: '柔和梦幻，少女心' },
            { id: 'fresh', name: '🌿 清新自然', desc: '绿意盎然，很舒服' },
            { id: 'ocean', name: '🐳 海洋泡泡', desc: '清凉透亮，夏日感' },
            { id: 'retro', name: '🌸 复古昭和', desc: '怀旧温柔，日系风' },
            { id: 'galaxy', name: '✨ 星空梦幻', desc: '璀璨星河，神秘感' }
        ];
        
        function App() {
            const [step, setStep] = useState(1);
            const [image, setImage] = useState(null);
            const [selectedStyle, setSelectedStyle] = useState(STYLES[0]);
            const [loading, setLoading] = useState(false);
            const [generatedUrl, setGeneratedUrl] = useState(null);
            const [error, setError] = useState(null);
            const fileRef = useRef(null);
            const [dragOver, setDragOver] = useState(false);
            
            const handleFile = (file) => {
                if (file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        setImage(e.target.result);
                        setStep(2);
                        setError(null);
                    };
                    reader.readAsDataURL(file);
                }
            };
            
            const handleGenerate = async () => {
                if (!selectedStyle) return;
                
                setLoading(true);
                setError(null);
                setStep(3);
                
                try {
                    // 调用后端 API 获取 Pollinations URL
                    const response = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ style: selectedStyle.id })
                    });
                    
                    const data = await response.json();
                    
                    if (!data.success) {
                        throw new Error(data.message || '生成失败');
                    }
                    
                    // 预加载图片
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.onload = () => {
                        setGeneratedUrl(data.imageUrl);
                        setLoading(false);
                        setStep(4);
                    };
                    img.onerror = () => {
                        setError('图片加载失败，请重试');
                        setLoading(false);
                        setStep(2);
                    };
                    img.src = data.imageUrl;
                    
                } catch (err) {
                    console.error('Error:', err);
                    setError('生成失败了: ' + err.message);
                    setLoading(false);
                    setStep(2);
                }
            };
            
            const handleReset = () => {
                setStep(1);
                setImage(null);
                setGeneratedUrl(null);
                setError(null);
                setSelectedStyle(STYLES[0]);
            };
            
            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="fixed inset-0 overflow-hidden pointer-events-none">
                        <div className="absolute w-32 h-32 bg-pink-300 rounded-full opacity-40 blur-3xl top-10 left-10 animate-float"></div>
                        <div className="absolute w-24 h-24 bg-blue-300 rounded-full opacity-40 blur-3xl top-40 right-20 animate-float" style={{animationDelay: '1s'}}></div>
                    </div>
                    
                    <div className="max-w-4xl mx-auto relative z-10">
                        <header className="text-center mb-10">
                            <div className="text-6xl mb-4 animate-float">🎁</div>
                            <h1 className="text-4xl md:text-5xl font-bold text-gray-800 mb-3">Wrap Studio</h1>
                            <p className="text-gray-600 text-lg">🎨 AI 礼品包装纸生成器</p>
                        </header>
                        
                        <div className="flex justify-center mb-10">
                            <div className="flex items-center gap-2 bg-white/70 px-6 py-3 rounded-full shadow-lg">
                                {[
                                    { num: 1, icon: '📸' },
                                    { num: 2, icon: '🎨' },
                                    { num: 3, icon: '✨' },
                                    { num: 4, icon: '💾' }
                                ].map((s, i) => (
                                    <React.Fragment key={s.num}>
                                        <div className={`flex items-center gap-2 px-3 py-2 rounded-full transition-all ${
                                            step >= s.num ? 'bg-gradient-to-r from-pink-300 to-purple-300 text-white' : 'bg-gray-100 text-gray-400'
                                        }`}>
                                            <span>{s.icon}</span>
                                        </div>
                                        {i < 3 && <div className="w-4 h-1 bg-gray-200 rounded"></div>}
                                    </React.Fragment>
                                ))}
                            </div>
                        </div>
                        
                        {step === 1 && (
                            <div className="glass rounded-3xl p-8 text-center">
                                <div 
                                    className={`upload-zone rounded-3xl p-12 cursor-pointer ${dragOver ? 'dragover' : ''}`}
                                    onClick={() => fileRef.current?.click()}
                                    onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                                    onDragLeave={() => setDragOver(false)}
                                    onDrop={(e) => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); }}
                                >
                                    <div className="text-6xl mb-4">📸</div>
                                    <p className="text-xl text-gray-700 mb-2 font-bold">点击或拖拽上传照片</p>
                                    <input type="file" ref={fileRef} className="hidden" accept="image/*" onChange={(e) => handleFile(e.target.files[0])} />
                                </div>
                            </div>
                        )}
                        
                        {step === 2 && (
                            <div className="glass rounded-3xl p-8">
                                <div className="flex items-center gap-4 mb-6">
                                    <button onClick={handleReset} className="text-gray-400 hover:text-gray-600">← 返回</button>
                                    <h2 className="text-2xl font-bold text-gray-800">选择风格</h2>
                                </div>
                                
                                <div className="mb-6 flex justify-center">
                                    <img src={image} className="w-32 h-32 object-cover rounded-2xl shadow-lg" />
                                </div>
                                
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
                                    {STYLES.map(style => (
                                        <div 
                                            key={style.id}
                                            className={`style-card bg-white rounded-2xl p-5 cursor-pointer text-center ${selectedStyle.id === style.id ? 'selected' : ''}`}
                                            onClick={() => setSelectedStyle(style)}
                                        >
                                            <div className="text-4xl mb-2">{style.name.split(' ')[0]}</div>
                                            <div className="font-bold text-gray-800">{style.name.split(' ')[1]}</div>
                                            <div className="text-sm text-gray-500 mt-1">{style.desc}</div>
                                        </div>
                                    ))}
                                </div>
                                
                                {error && (
                                    <div className="bg-red-100 text-red-600 p-4 rounded-2xl mb-6 text-center">{error}</div>
                                )}
                                
                                <button onClick={handleGenerate} className="btn-primary w-full py-4 rounded-full text-white font-bold text-lg">
                                    ✨ AI 生成
                                </button>
                            </div>
                        )}
                        
                        {step === 3 && loading && (
                            <div className="glass rounded-3xl p-12 text-center">
                                <div className="loading-ring w-20 h-20 mx-auto mb-6"></div>
                                <p className="text-2xl font-bold text-gray-800 mb-2">AI 正在创作中...</p>
                                <p className="text-gray-500">使用 Pollinations.ai 免费生成（约 10-30 秒）</p>
                            </div>
                        )}
                        
                        {step === 4 && generatedUrl && (
                            <div className="glass rounded-3xl p-8">
                                <div className="text-center mb-6">
                                    <div className="text-5xl mb-3">🎉</div>
                                    <h2 className="text-2xl font-bold text-gray-800">完成啦！</h2>
                                </div>
                                
                                <div className="mb-6">
                                    <p className="text-gray-600 mb-3 text-center">AI 生成的包装纸：</p>
                                    <div className="rounded-2xl overflow-hidden shadow-xl border-4 border-white">
                                        <img src={generatedUrl} alt="生成的包装纸" className="w-full h-auto" crossOrigin="anonymous" />
                                    </div>
                                </div>
                                
                                <div className="flex gap-4">
                                    <a href={generatedUrl} download target="_blank" rel="noopener noreferrer" className="btn-primary flex-1 py-4 rounded-full text-white font-bold text-center block">
                                        💾 下载图片
                                    </a>
                                    <button onClick={handleReset} className="bg-gray-100 text-gray-600 px-6 py-4 rounded-full font-bold hover:bg-gray-200">🔄 再来一张</button>
                                </div>
                                
                                <p className="text-center text-sm text-gray-400 mt-4">Powered by Pollinations.ai</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
